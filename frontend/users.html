<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users — NexusPanel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="index.html" class="nav-brand">
        <span class="brand-dot"></span>
        NexusPanel
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Dashboard</a>
        <a href="users.html" class="nav-link">Users</a>
        <a href="records.html" class="nav-link">Records</a>
      </div>
      <div class="nav-right">
        <span class="nav-user" id="nav-user">—</span>
        <span class="role-badge" id="role-badge">—</span>
        <button class="btn-logout" id="logout-btn">Sign Out</button>
      </div>
    </nav>

    <main>
      <div class="page-container">
        <!-- PAGE HEADER -->
        <div class="page-header">
          <div>
            <h1 class="page-title">User <span>Management</span></h1>
            <p class="page-subtitle" id="user-total-count">—</p>
          </div>
          <div style="display: flex; gap: 8px; align-items: center">
            <!-- ADMIN only -->
            <button class="btn btn-primary" id="create-user-btn">
              + Create User
            </button>
          </div>
        </div>

        <!-- FILTERS BAR -->
        <div class="filters-bar">
          <div class="search-input-wrap">
            <span class="search-icon">⌕</span>
            <input
              type="text"
              class="search-input"
              id="user-search"
              placeholder="Search users by name or email…"
            />
          </div>
          <select
            class="form-select"
            id="user-role-filter"
            style="width: auto; padding: 9px 14px"
          >
            <option value="">All Roles</option>
            <option value="ADMIN">Admin</option>
            <option value="ANALYST">Analyst</option>
            <option value="VIEWER">Viewer</option>
          </select>
          <select
            class="form-select"
            id="user-status-filter"
            style="width: auto; padding: 9px 14px"
          >
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

        <!-- USERS TABLE -->
        <div class="card" style="padding: 0">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>User</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <tr>
                  <td colspan="7">
                    <div class="empty-state">
                      <div class="empty-desc">Loading users…</div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- PAGINATION -->
          <div class="pagination" style="padding: 12px 20px">
            <span class="pagination-info" id="pagination-info">—</span>
            <div class="pagination-controls" id="pagination-controls"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- ── CREATE / EDIT USER MODAL ── -->
    <div class="modal-overlay" id="user-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="user-modal-title">Create User</h3>
          <button class="modal-close" aria-label="Close">✕</button>
        </div>

        <form id="user-form" novalidate autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="user-name-input">Full Name</label>
            <input
              type="text"
              class="form-input"
              id="user-name-input"
              placeholder="John Doe"
             
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="user-email-input"
              >Email Address</label
            >
            <input
              type="text"
              class="form-input"
              id="user-email-input"
              placeholder="john@example.com"
             
            />
          </div>
          <div class="form-group" id="user-password-group">
            <label class="form-label" for="user-password-input">Password</label>
            <input
              type="password"
              class="form-input"
              id="user-password-input"
              placeholder="Min. 8 characters"
             
            />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px">
            <div class="form-group">
              <label class="form-label" for="user-role-input">Role</label>
              <select class="form-select" id="user-role-input">
                <option value="VIEWER">Viewer</option>
                <option value="ANALYST">Analyst</option>
                <option value="ADMIN">Admin</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="user-status-input">Status</label>
              <select class="form-select" id="user-status-input">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div
            id="user-form-error"
            class="hidden"
            style="
              margin-top: 10px;
              padding: 10px 14px;
              border-radius: var(--radius);
              border: 1px solid rgba(255, 59, 92, 0.25);
              background: rgba(255, 59, 92, 0.08);
              color: var(--accent-red);
              font-size: 12px;
            "
          ></div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary modal-close">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary" id="user-submit-btn">
              Save User
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── DELETE CONFIRM MODAL ── -->
    <div class="modal-overlay" id="delete-confirm-modal">
      <div class="modal" style="max-width: 380px">
        <div class="modal-header">
          <h3 class="modal-title" style="color: var(--accent-red)">
            ⚠ Delete User
          </h3>
          <button class="modal-close" aria-label="Close">✕</button>
        </div>
        <p
          style="
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
          "
        >
          Are you sure you want to delete
          <strong
            id="delete-user-name"
            style="color: var(--text-primary)"
          ></strong
          >?
        </p>
        <p style="font-size: 12px; color: var(--text-muted)">
          This action cannot be undone.
        </p>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary modal-close">
            Cancel
          </button>
          <button type="button" class="btn btn-danger" id="delete-confirm-btn">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="users.js"></script>
  </body>
</html>
